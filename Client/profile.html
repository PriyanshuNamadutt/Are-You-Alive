<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>User Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.07);
    --accent: #c8a96e;
    --accent2: #e8c98e;
    --text: #f0ede8;
    --muted: #7a7880;
    --danger: #e05c5c;
    --safe: #5ccfa0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  /* Ambient orb */
  body::before {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(200,169,110,0.08) 0%, transparent 70%);
    top: -100px; left: -100px;
    pointer-events: none;
    border-radius: 50%;
  }

  .wrapper {
    width: 100%;
    max-width: 860px;
    animation: fadeUp 0.7s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Header ── */
  .profile-header {
    display: flex;
    align-items: flex-end;
    gap: 32px;
    padding: 40px 40px 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    position: relative;
    overflow: hidden;
  }

  .profile-header::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(200,169,110,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .avatar-ring {
    flex-shrink: 0;
    width: 100px; height: 100px;
    border-radius: 50%;
    padding: 3px;
    background: conic-gradient(var(--accent), var(--accent2), var(--accent));
    position: relative;
  }

  .avatar-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -1px;
  }

  .header-info { flex: 1; }

  .header-info h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.4px;
  }

  .badge-role {
    background: rgba(200,169,110,0.15);
    color: var(--accent2);
    border: 1px solid rgba(200,169,110,0.25);
  }

  .badge-active {
    background: rgba(92,207,160,0.12);
    color: var(--safe);
    border: 1px solid rgba(92,207,160,0.2);
  }

  .badge-active::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--safe);
    box-shadow: 0 0 6px var(--safe);
  }

  .edit-btn {
    margin-left: auto;
    padding: 9px 22px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    align-self: flex-start;
  }

  .edit-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,169,110,0.07);
  }

  /* ── Body ── */
  .profile-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 24px 24px;
    padding: 0 40px 40px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 36px;
  }

  /* Section */
  .section { margin-bottom: 40px; }

  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .section-label span {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Info grid */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .info-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    transition: border-color 0.2s;
    animation: fadeUp 0.5s ease both;
  }

  .info-card:hover { border-color: rgba(200,169,110,0.25); }

  .info-card .label {
    font-size: 0.72rem;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .info-card .value {
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    word-break: break-word;
  }

  .info-card .value.accent { color: var(--accent2); }

  /* Emergency contacts */
  .contacts-list { display: flex; flex-direction: column; gap: 14px; }

  .contact-card {
    display: flex;
    align-items: center;
    gap: 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.5s ease both;
  }

  .contact-card:hover {
    border-color: rgba(200,169,110,0.25);
    transform: translateX(4px);
  }

  .contact-avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: rgba(200,169,110,0.12);
    border: 1px solid rgba(200,169,110,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
  }

  .contact-info { flex: 1; }
  .contact-name { font-weight: 500; font-size: 0.95rem; margin-bottom: 3px; }
  .contact-rel  { font-size: 0.78rem; color: var(--muted); margin-bottom: 2px; }
  .contact-phone{ font-size: 0.85rem; color: var(--accent2); font-weight: 500; }


  /* Loading */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 16px;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-state {
    padding: 40px;
    text-align: center;
    color: var(--danger);
    font-size: 0.9rem;
  }

  /* Stagger children */
  .info-card:nth-child(1) { animation-delay: 0.05s; }
  .info-card:nth-child(2) { animation-delay: 0.10s; }
  .info-card:nth-child(3) { animation-delay: 0.15s; }
  .info-card:nth-child(4) { animation-delay: 0.20s; }
  .info-card:nth-child(5) { animation-delay: 0.25s; }
  .info-card:nth-child(6) { animation-delay: 0.30s; }

  .contact-card:nth-child(1) { animation-delay: 0.08s; }
  .contact-card:nth-child(2) { animation-delay: 0.16s; }
  .contact-card:nth-child(3) { animation-delay: 0.24s; }

  @media (max-width: 580px) {
    .profile-header { flex-direction: column; align-items: flex-start; padding: 28px 24px; }
    .profile-body { padding: 0 24px 32px; }
    .edit-btn { margin-left: 0; }
    .info-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="profile-header" id="profileHeader">
    <div class="loading-state" style="width:100%">
      <div class="spinner"></div>
      <span>Loading profile…</span>
    </div>
  </div>
  <div class="profile-body" id="profileBody" style="display:none">
    <div class="divider"></div>

    <div class="section" id="personalSection"></div>
    <div class="section" id="medicalSection"></div>
    <div class="section" id="contactSection"></div>
  </div>
</div>

<script>
// ── Simulated "backend" fetch ────────────────────────────────────────────────
async function fetchUserProfile() {
  // Replace this with a real fetch() call to your API endpoint, e.g.:
  // const res = await fetch('/api/user/profile');
  // return await res.json();

  const token = localStorage.getItem("token");

  const res = await fetch("https://are-you-alive-2.onrender.com/api/profile", {
    headers: {
      "Authorization": `Bearer ${token}`
    }
  });

  if (!res.ok) throw new Error("Failed");

  return await res.json();

  return new Promise(resolve => setTimeout(() => resolve({
    id: "USR-2847",
    name: "Arjun Mehta",
    age: 34,
    dateOfBirth: "12 March 1991",
    gender: "Male",
    bloodGroup: "B+",
    email: "arjun.mehta@example.com",
    phone: "+91 98765 43210",
    address: "42 Park Street, Kolkata, WB 700016",
    nationality: "Indian",
    occupation: "Senior Software Engineer",
    role: "Premium Member",
    status: "Active",
    memberSince: "January 2022",
    medicalInfo: {
      allergies: "Penicillin, Peanuts",
      conditions: "Mild Hypertension",
      bloodPressure: "130/85 mmHg",
      organDonor: "Yes",
    },
    emergencyContacts: [
      { name: "Priya Mehta",   relation: "Spouse",  phone: "+91 91234 56789", priority: 1 },
      { name: "Rajesh Mehta",  relation: "Father",  phone: "+91 98001 23456", priority: 2 },
      { name: "Sunita Sharma", relation: "Sister",  phone: "+91 87654 32109", priority: 3 },
    ]
  }), 1200));
}

// ── Helpers ─────────────────────────────────────────────────────────────────
function initials(name) {
  return name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
}


function infoCard(label, value, accent = false) {
  return `<div class="info-card">
    <div class="label">${label}</div>
    <div class="value${accent ? ' accent' : ''}">${value}</div>
  </div>`;
}

function section(labelText, innerHtml) {
  return `
    <div class="section-label"><span>${labelText}</span></div>
    ${innerHtml}
  `;
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderProfile(user) {
  const header = document.getElementById('profileHeader');
  const body   = document.getElementById('profileBody');

  // Header
  header.innerHTML = `
    <div class="avatar-ring">
      <div class="avatar-inner">${initials(user.name)}</div>
    </div>
    <div class="header-info">
      <h1>${user.name}</h1>
      <div class="header-meta">
        <span class="badge badge-role">⭑ ${user.role}</span>
        <span class="badge badge-active">${user.status}</span>
        <span style="font-size:.8rem;color:var(--muted)">ID: ${user.id}</span>
      </div>
    </div>
    <button class="edit-btn" id="editBtn">Edit Profile</button>
  `;

  document.getElementById("editBtn").addEventListener("click", () => {
  window.location.href = "edit-profile.html";
  });

  // Personal info
  document.getElementById('personalSection').innerHTML = section('Personal Information', `
    <div class="info-grid">
      ${infoCard('Full Name', user.name)}
      ${infoCard('Age', user.age + ' years')}
      ${infoCard('Date of Birth', user.dateOfBirth)}
      ${infoCard('Gender', user.gender)}
      ${infoCard('Blood Group', user.bloodGroup, true)}
      ${infoCard('Nationality', user.nationality)}
      ${infoCard('Occupation', user.occupation)}
      ${infoCard('Member Since', user.memberSince)}
      ${infoCard('Email', user.email)}
      ${infoCard('Phone', user.phone)}
      ${infoCard('Address', user.address)}
    </div>
  `);

  // Medical info
  document.getElementById('medicalSection').innerHTML = section('Medical Information', `
    <div class="info-grid">
      ${infoCard('Allergies', user.medicalInfo.allergies, true)}
      ${infoCard('Conditions', user.medicalInfo.conditions)}
      ${infoCard('Blood Pressure', user.medicalInfo.bloodPressure)}
      ${infoCard('Organ Donor', user.medicalInfo.organDonor)}
    </div>
  `);

  // Emergency contacts
  const contactsHtml = user.emergencyContacts.map(c => `
    <div class="contact-card">
      <div class="contact-avatar">${initials(c.name)}</div>
      <div class="contact-info">
        <div class="contact-name">${c.name}</div>
        <div class="contact-rel">${c.relation}</div>
        <div class="contact-phone">${c.phone}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('contactSection').innerHTML = section('Emergency Contacts', `
    <div class="contacts-list">${contactsHtml}</div>
  `);

  body.style.display = 'block';
}

// ── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  try {
    const user = await fetchUserProfile();
    renderProfile(user);
  } catch (err) {
    document.getElementById('profileHeader').innerHTML =
      `<div class="error-state">Failed to load profile. Please try again.</div>`;
    console.error(err);
  }
})();
</script>
</body>
</html>
