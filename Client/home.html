<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
</head>
<body>

<h1>Welcome 🎉</h1>
<p>You are logged in</p>

<button id="myBtn">Click Me</button>
<style>
#myBtn {
    background: green;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
</style>

<script>
document.getElementById("myBtn").addEventListener("click", async () => {

    const token = localStorage.getItem("token");

    const res = await fetch("https://are-you-alive-2.onrender.com/api/click", {
        method: "PATCH",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token 
        }
    });

    const data = await res.json();

    alert("Last clicked: " + new Date(data.time).toLocaleString());
});
</script>

<button onclick="goToProfile()">View Profile</button>

<script>
function goToProfile() {
    
    window.location.href = "profile.html";
}

</script>

</body>
</html>
