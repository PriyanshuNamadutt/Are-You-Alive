<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Are You Alive?</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green-deep:   #0a2e1a;
    --green-mid:    #0d4a26;
    --green-vivid:  #1a7a40;
    --green-bright: #22c55e;
    --green-glow:   #4ade80;
    --green-pale:   #bbf7d0;
    --white:        #f0faf4;
    --dark:         #061710;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
  }

  body {
    background: var(--green-deep);
    font-family: 'Outfit', sans-serif;
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    cursor: default;
  }

  /* ── Layered background ── */
  .bg-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* Radial green gradient centre */
  .bg-layer::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 40%, rgba(26,122,64,0.55) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 20% 80%, rgba(34,197,94,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 80% 10%, rgba(74,222,128,0.10) 0%, transparent 60%);
  }

  /* Subtle grid texture */
  .bg-layer::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(34,197,94,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,197,94,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* Floating particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    background: var(--green-bright);
    opacity: 0;
    animation: float linear infinite;
  }

  @keyframes float {
    0%   { transform: translateY(110vh) scale(0); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* ── Main content ── */
  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    text-align: center;
    padding: 20px;
  }

  /* ── Logo / Brand ── */
  .logo-wrap {
    animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.6) translateY(30px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .logo-icon {
    width: 120px;
    height: 120px;
    margin: 0 auto 24px;
    position: relative;
  }

  /* Outer pulsing ring */
  .logo-icon::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid rgba(74,222,128,0.4);
    animation: pulse-ring 2s ease-out infinite;
  }

  .logo-icon::after {
    content: '';
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    border: 1px solid rgba(74,222,128,0.15);
    animation: pulse-ring 2s ease-out infinite 0.5s;
  }

  @keyframes pulse-ring {
    0%   { transform: scale(1);    opacity: 0.8; }
    100% { transform: scale(1.35); opacity: 0;   }
  }

  .logo-circle {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--green-vivid) 0%, var(--green-bright) 100%);
    box-shadow:
      0 0 0 4px rgba(34,197,94,0.2),
      0 0 40px rgba(34,197,94,0.45),
      0 0 80px rgba(34,197,94,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .logo-circle::before {
    content: '';
    position: absolute;
    top: -30%;
    left: -10%;
    width: 60%;
    height: 60%;
    background: rgba(255,255,255,0.12);
    border-radius: 50%;
    filter: blur(12px);
  }

  /* Heartbeat SVG inside logo */
  .heartbeat-svg {
    width: 64px;
    height: 32px;
    position: relative;
    z-index: 1;
  }

  .heartbeat-path {
    fill: none;
    stroke: #fff;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 120;
    stroke-dashoffset: 120;
    animation: drawLine 1.2s ease forwards 0.5s, beatPulse 1.8s ease-in-out infinite 1.8s;
  }

  @keyframes drawLine {
    to { stroke-dashoffset: 0; }
  }

  @keyframes beatPulse {
    0%, 100% { stroke-dashoffset: 0; opacity: 1; }
    50%       { stroke-dashoffset: -8; opacity: 0.8; }
  }

  /* ── Brand text ── */
  .brand-tag {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--green-glow);
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.7s;
    margin-bottom: 10px;
  }

  .brand-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 10vw, 7rem);
    line-height: 0.92;
    letter-spacing: 3px;
    color: var(--white);
    text-shadow:
      0 0 60px rgba(74,222,128,0.35),
      0 2px 0 rgba(0,0,0,0.3);
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.9s;
  }

  .brand-name .highlight {
    color: var(--green-glow);
    text-shadow:
      0 0 20px rgba(74,222,128,0.8),
      0 0 60px rgba(74,222,128,0.4);
  }

  .brand-sub {
    font-size: 1rem;
    font-weight: 300;
    color: rgba(187,247,208,0.65);
    letter-spacing: 1.5px;
    margin-top: 14px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 1.1s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Divider ── */
  .divider {
    width: 160px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green-bright), transparent);
    margin: 36px auto;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1.3s;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* ── Buttons ── */
  .btn-group {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 1.5s;
  }

  .btn {
    position: relative;
    padding: 15px 40px;
    border-radius: 50px;
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    border: none;
    transition: all 0.25s ease;
    overflow: hidden;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }

  /* Shine sweep on hover */
  .btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.45s ease;
  }

  .btn:hover::before { left: 150%; }

  /* Primary — solid glowing green */
  .btn-primary {
    background: linear-gradient(135deg, var(--green-bright) 0%, #16a34a 100%);
    color: #fff;
    box-shadow:
      0 4px 20px rgba(34,197,94,0.5),
      0 1px 0 rgba(255,255,255,0.15) inset;
  }

  .btn-primary:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow:
      0 8px 32px rgba(34,197,94,0.65),
      0 1px 0 rgba(255,255,255,0.15) inset;
  }

  .btn-primary:active {
    transform: translateY(0) scale(0.98);
  }

  /* Secondary — outlined */
  .btn-secondary {
    background: rgba(34,197,94,0.08);
    color: var(--green-pale);
    border: 1.5px solid rgba(74,222,128,0.45);
    backdrop-filter: blur(6px);
    box-shadow: 0 4px 20px rgba(34,197,94,0.1);
  }

  .btn-secondary:hover {
    background: rgba(34,197,94,0.18);
    border-color: var(--green-glow);
    color: #fff;
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 28px rgba(34,197,94,0.25);
  }

  .btn-secondary:active {
    transform: translateY(0) scale(0.98);
  }

  /* Button icon */
  .btn svg {
    width: 18px; height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }

  /* ── Footer note ── */
  .footer-note {
    position: fixed;
    bottom: 28px;
    font-size: 0.75rem;
    color: rgba(187,247,208,0.3);
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 2s;
  }

  /* ── Click Me modal / response ── */
  .alive-response {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: linear-gradient(135deg, var(--green-mid), var(--green-deep));
    border: 1px solid rgba(74,222,128,0.35);
    border-radius: 24px;
    padding: 48px 56px;
    text-align: center;
    z-index: 100;
    box-shadow: 0 0 80px rgba(34,197,94,0.3), 0 32px 64px rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    max-width: 90vw;
  }

  .alive-response.show {
    opacity: 1;
    pointer-events: all;
    transform: translate(-50%, -50%) scale(1);
  }

  .alive-response h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: var(--green-glow);
    text-shadow: 0 0 30px rgba(74,222,128,0.6);
    letter-spacing: 3px;
    margin-bottom: 10px;
  }

  .alive-response p {
    color: rgba(187,247,208,0.7);
    font-size: 0.95rem;
    margin-bottom: 28px;
  }

  .close-btn {
    padding: 10px 30px;
    border-radius: 50px;
    border: 1.5px solid rgba(74,222,128,0.4);
    background: transparent;
    color: var(--green-pale);
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .close-btn:hover {
    background: rgba(34,197,94,0.15);
    border-color: var(--green-glow);
    color: #fff;
  }

  /* overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(6,23,16,0.75);
    backdrop-filter: blur(4px);
    z-index: 99;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  @media (max-width: 480px) {
    .btn-group { flex-direction: column; align-items: center; }
    .btn { width: 240px; justify-content: center; }
    .alive-response { padding: 36px 28px; }
  }
</style>
</head>
<body>

<!-- Background layers -->
<div class="bg-layer"></div>
<div class="particles" id="particles"></div>

<!-- Main content -->
<div class="container">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-icon">
      <div class="logo-circle">
        <svg class="heartbeat-svg" viewBox="0 0 64 32" xmlns="http://www.w3.org/2000/svg">
          <path class="heartbeat-path" d="M0,16 L10,16 L14,6 L20,26 L26,10 L30,20 L34,16 L64,16"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Brand text -->
  <p class="brand-tag">Check your pulse</p>
  <h1 class="brand-name">
    Are You<br><span class="highlight">Alive?</span>
  </h1>
  <p class="brand-sub">Your health. Your story. Your dashboard.</p>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- Buttons -->
  <div class="btn-group">
    <button class="btn btn-primary" id="clickMeBtn">
      <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      Click Me
    </button>
    <a href="profile.html" class="btn btn-secondary">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      View Profile
    </a>
  </div>

</div>

<!-- Footer -->
<p class="footer-note">ARE YOU ALIVE &nbsp;·&nbsp; HEALTH PLATFORM</p>

<!-- Click Me modal -->
<div class="overlay" id="overlay"></div>
<div class="alive-response" id="aliveModal">
  <h2>YES, YOU ARE! 💚</h2>
  <p>Your heartbeat is registered.<br>Stay active. Stay alive.</p>
  <button class="close-btn" id="closeModal">Close</button>
</div>

<script>
  // ── Floating particles ─────────────────────────────────────────────────────
  const particlesEl = document.getElementById('particles');
  const count = 22;

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 5 + 2;
    p.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      animation-duration: ${Math.random() * 12 + 8}s;
      animation-delay: ${Math.random() * 10}s;
      opacity: 0;
    `;
    particlesEl.appendChild(p);
  }

  // ── Click Me button ────────────────────────────────────────────────────────
//   const clickMeBtn  = document.getElementById('clickMeBtn');
//   const aliveModal  = document.getElementById('aliveModal');
//   const overlay     = document.getElementById('overlay');
//   const closeModal  = document.getElementById('closeModal');

  function openModal() {
    aliveModal.classList.add('show');
    overlay.classList.add('show');
  }

  function closeModalFn() {
    aliveModal.classList.remove('show');
    overlay.classList.remove('show');
  }

  document.getElementById("clickMeBtn").addEventListener("click", async () => {

    const token = localStorage.getItem("token");

    const res = await fetch("http://localhost:5000/api/click", {
        method: "PATCH",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token 
        }
    });

    const data = await res.json();

    alert("Last clicked: " + new Date(data.time).toLocaleString());
});


// </script>
</body>
</html>
